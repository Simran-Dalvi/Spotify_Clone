<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>K-POP Demon Hunters</title>
</head>
<body>
    
    <nav>
        <ul>
            <li class = "logo"><img src = "images/logo.png" alt="Kpop Demon Hunters"></li>
            <li>Home</li>
            <li>About</li>
        </ul>
    </nav>

    <div class="container">
        

        <div class="songlist">
            <div class="songitem">
                <img src="cover/1.jpg" alt="1">
                <span class="songname">1</span>
                <span class="timestamp"> 0:00</span>
                <i class="songitemplay fa-solid fa-circle-play"></i>
            </div>

            <div class="songitem">
                <img src="cover/2.jpg" alt="2">
                <span class="songname"> Golden - Hunter/X</span>
                <span class="timestamp"> 3:14</span>
                <i class="songitemplay fa-solid fa-circle-play"></i>
            </div>

            <div class="songitem">
                <img src="cover/3.jpg" alt="3">
                <span class="songname"> 3</span>
                <span class="timestamp"> 2:30</span>
                <i class="songitemplay fa-solid fa-circle-play"></i>
            </div>

            <div class="songitem">
                <img src="cover/4.jpg" alt="4">
                <span class="songname"> Takedown - Hunter/X</span>
                <span class="timestamp"> 3:02</span>
                <i class="songitemplay fa-solid fa-circle-play"></i>
            </div>

            <div class="songitem">
                <img src="cover/5.jpg" alt="5">
                <span class="songname"> Your Idol - Saja Boys</span>
                <span class="timestamp"> 3:11</span>
                <i class="songitemplay fa-solid fa-circle-play"></i>
            </div>

            <div class="songitem">
                <img src="cover/6.jpg" alt="6">
                <span class="songname"> Free - Rumi, Jinu</span>
                <span class="timestamp"> 3:08</span>
                <i class="songitemplay fa-solid fa-circle-play"></i>
            </div>

            <div class="songitem">
                <img src="cover/7.jpg" alt="7">
                <span class="songname"> What It Sounds Like - Hunter/X</span>
                <span class="timestamp"> 4:10</span>
                <i class="songitemplay fa-solid fa-circle-play"></i>
            </div>

            <div class="songitem">
                <img src="cover/8.jpg" alt="8">
                <span class="songname"> Stratergy - TWICE</span>
                <span class="timestamp"> 2:46</span>
                <i class="songitemplay fa-solid fa-circle-play"></i>
            </div>
        </div>
    </div>

    <div class="player">
        
        <div class="left">
            <img src="images/gif.gif" id="gif" alt="">
            <span id="mastersongname">Song Playing</span>
        </div>
        <div class="center">
            <div class="buttons">
                <i class="fa-solid fa-backward"></i>
                <i class="fa-solid fa-circle-play" id = "masterPlayButton"></i>
                <!-- <i class="fa-regular fa-circle-pause"></i> -->
                <i class="fa-solid fa-forward"></i>
            </div>
            <input type="range" name="songprogress" id="songprogress" min="0" max="100" value="0">
        </div>

        <div class="right">
            <!-- keep it empty for now -->
        </div>

        
    </div>
    <script src="script.js" defer></script>
    <script src="https://kit.fontawesome.com/6ea07e9402.js" crossorigin="anonymous"></script>
</body>
</html>
